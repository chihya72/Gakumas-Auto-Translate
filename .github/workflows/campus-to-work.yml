name: Campus to Workbench

on:
  workflow_dispatch:
    inputs:
      prefix:
        description: "逗号分隔前缀白名单；留空=已翻译范围默认白名单"
        required: false
        default: ""
      limit:
        description: "单次最多处理文件数；留空=50，0=不限"
        required: false
        default: ""
  schedule:
    # UTC 00:17-15:17 = Beijing 08:17-23:17
    - cron: "17 0-15 * * *"

permissions:
  contents: write

# 防止定时与手动触发重叠运行（重复开 issue / push 冲突）
concurrency:
  group: campus-pipeline
  cancel-in-progress: false

jobs:
  campus-to-workbench:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PIPELINE_PAT }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      MODEL: ${{ secrets.MODEL }}
      MAX_TOKENS: ${{ secrets.MAX_TOKENS }}
      LOG_LEVEL: info
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: python -m pip install pandas

      - name: Run pipeline
        run: |
          test -n "$GH_TOKEN" || (echo "Missing secret PIPELINE_PAT" && exit 1)
          # 让 git 复用 gh 的 token 凭据——否则 seed 对工作仓库的 git push 会 128 认证失败
          gh auth setup-git
          # 机翻前先自检 PAT 对工作仓库有写权限，避免翻完 push 不上白烧 API 费
          PUSH_OK=$(gh api repos/chihya72/gakumas-translation-work --jq '.permissions.push' 2>/dev/null || echo false)
          if [ "$PUSH_OK" != "true" ]; then
            echo "::error::PIPELINE_PAT 对 gakumas-translation-work 没有写权限（permissions.push=$PUSH_OK）。请检查 PAT 的仓库范围/scope。"
            exit 1
          fi
          test -n "$OPENAI_API_KEY" || (echo "Missing secret OPENAI_API_KEY" && exit 1)
          test -n "$OPENAI_BASE_URL" || (echo "Missing secret OPENAI_BASE_URL" && exit 1)
          test -n "$MODEL" || (echo "Missing secret MODEL" && exit 1)
          PREFIX="${{ github.event.inputs.prefix }}"
          LIMIT="${{ github.event.inputs.limit }}"
          # 默认白名单=已翻译范围前缀，排除 pstep/pweek/gasha/produce_lesson 等系统文本积压
          DEFAULT_PREFIX="adv_cidol,adv_csprt,adv_dear,adv_event,adv_live,adv_pevent,adv_pgrowth,adv_presult,adv_produce-refresh,adv_pstory,adv_startup,adv_tower,adv_tutorial,adv_unit"
          python tools/auto_campus_pipeline.py \
            --prefix "${PREFIX:-$DEFAULT_PREFIX}" \
            --limit "${LIMIT:-50}"

      - name: Commit pretranslated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add csv_data
          if git diff --cached --quiet; then
            echo "No csv_data changes"
          else
            git commit -m "auto pretranslate campus updates"
            git push
          fi
