name: Campus to Workbench

on:
  workflow_dispatch:
    inputs:
      prefix:
        description: "Only import txt files with this prefix"
        required: false
        default: "adv_"
      limit:
        description: "Max files to import; 0 means all"
        required: false
        default: "0"
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  campus-to-workbench:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.PIPELINE_PAT }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      MODEL: ${{ secrets.MODEL }}
      MAX_TOKENS: ${{ secrets.MAX_TOKENS }}
      LOG_LEVEL: info
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: python -m pip install pandas

      - name: Run pipeline
        run: |
          test -n "$GH_TOKEN" || (echo "Missing secret PIPELINE_PAT" && exit 1)
          test -n "$OPENAI_API_KEY" || (echo "Missing secret OPENAI_API_KEY" && exit 1)
          test -n "$OPENAI_BASE_URL" || (echo "Missing secret OPENAI_BASE_URL" && exit 1)
          test -n "$MODEL" || (echo "Missing secret MODEL" && exit 1)
          PREFIX="${{ github.event.inputs.prefix }}"
          LIMIT="${{ github.event.inputs.limit }}"
          python tools/auto_campus_pipeline.py \
            --prefix "${PREFIX:-adv_}" \
            --limit "${LIMIT:-0}"

      - name: Commit pretranslated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add csv_data
          if git diff --cached --quiet; then
            echo "No csv_data changes"
          else
            git commit -m "auto pretranslate campus updates"
            git push
          fi
